<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="style.css" rel="stylesheet"/>
    <title>Artly</title>
  </head>
  <body>
    <div id="top-bg-color">
    <header>
      <h1>Artly</h1>
    </header>
    <main>
      <section id="single-work"/>
        <h2>Artwork Details</h2>
        <div id="card"></div>
      </section>
      <form>
        <h2>Search For Paintings By Keyword</h2>
        <div class="form-row">
          <div class="form-field">
            <label for="keyword">Keyword</label>
            <input type="text" id="keyword" name="keyword" required/>
          </div>
        </div>

        <fieldset>
          <legend>Select the number of results you'd like:</legend>
          <div>
            <input type="radio" id="results-25" name="results" value="25" />
            <label for="results-25">25</label>
          </div>
          <div>
            <input type="radio" id="results-50" name="results" value="50" />
            <label for="results-50">50</label>
          </div>
          <div>
            <input type="radio" id="results-100" name="results" value="100" />
            <label for="results-100">100</label>
          </div>
        </fieldset>

        <button type="submit">Search for paintings!</button>
      </form>
    </div>
      <section id="collection">
        <h2>Collection</h2>
        <p id="error" class="hidden"></p>
        <ul id="collection-list"></ul>
      </section>
    </main>
    <script type="module" src="src/main.js"></script>
  </body>
</html>
